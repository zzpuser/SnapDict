name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如 1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "tag=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            VERSION=${GITHUB_REF_NAME#v}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT
          fi

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -scheme SnapDict -project SnapDict.xcodeproj

      - name: Build
        run: |
          xcodebuild build \
            -scheme SnapDict \
            -project SnapDict.xcodeproj \
            -configuration Release \
            -derivedDataPath build \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          APP_PATH="build/Build/Products/Release/SnapDict.app"
          DMG_NAME="SnapDict-${{ steps.version.outputs.version }}.dmg"

          mkdir -p dmg_content
          cp -R "$APP_PATH" dmg_content/

          create-dmg \
            --volname "SnapDict" \
            --volicon "SnapDict/AppIcon.icns" \
            --background "scripts/dmg-background.png" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 80 \
            --icon "SnapDict.app" 180 170 \
            --hide-extension "SnapDict.app" \
            --app-drop-link 480 170 \
            --no-internet-enable \
            "$DMG_NAME" \
            dmg_content/ \
          || test $? -eq 2

          echo "dmg_name=$DMG_NAME" >> $GITHUB_ENV

      - name: Create tag (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Generate changelog
        id: changelog
        run: |
          # 获取上一个 tag
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s" --no-merges)
          fi
          # 写入多行输出
          {
            echo "log<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: SnapDict ${{ steps.version.outputs.version }}
          body: |
            ## 更新内容
            ${{ steps.changelog.outputs.log }}

            ## 安装方式
            1. 下载 DMG 文件
            2. 打开 DMG，将 SnapDict 拖入 Applications 文件夹
            3. 终端执行 `sudo xattr -r -d com.apple.quarantine /Applications/SnapDict.app`
            4. 打开 SnapDict
          files: ${{ env.dmg_name }}
          draft: false
          prerelease: false
